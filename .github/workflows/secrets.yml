# Secret scanning: the real control.
#
# The pre-commit hook in .git/hooks is a convenience that catches
# secrets locally. It is neither cloned nor shared -- on any other
# machine or for any contributor, it does not exist.
#
# This workflow is the actual control: it runs on every push and PR
# and blocks the merge on any finding.

name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for detect mode

      - uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --config .gitleaks.toml --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
