# CI: lint, type check, tests, and evals on every push.
#
# Runs the DETERMINISTIC eval suite only (make evals without --llm).
# The LLM-dependent evals require ANTHROPIC_API_KEY and cost ~$0.50
# per run. They are run manually before releases, not on every push.
# This is a stated budget choice, not an oversight.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.18.0
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Index corpus
        run: python -m custos.ingest
        env:
          QDRANT_URL: http://localhost:6333

      - name: Run tests
        run: pytest tests/ -q
        env:
          QDRANT_URL: http://localhost:6333

      - name: Run evals (deterministic, no LLM)
        run: python -m evals.harness
        env:
          QDRANT_URL: http://localhost:6333

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Run tests (vitest)
        run: npx vitest run

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.example.com
