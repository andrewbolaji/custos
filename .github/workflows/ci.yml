name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check src/ tests/ evals/ corpus/

      - name: Type check
        run: python -m mypy src/

      - name: Generate corpus
        run: python corpus/generate.py

      - name: Test
        run: python -m pytest -v

      - name: Eval harness (skeleton)
        run: python -m evals.harness

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Scan for secrets
        run: gitleaks detect --source . --log-opts="--all" -v
