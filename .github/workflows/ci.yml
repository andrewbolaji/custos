name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check src/ tests/ evals/ corpus/

      - name: Type check
        run: python -m mypy src/ corpus/ evals/

      - name: Generate corpus
        run: python corpus/generate.py

      - name: Test
        run: python -m pytest -v

      - name: Eval harness (LLM-free)
        run: python -m evals.harness

  access-control-gate:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.12.6
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/readyz || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Generate corpus
        run: python corpus/generate.py

      - name: Index corpus into Qdrant
        run: python -m custos.ingest

      - name: Run access-control eval (hard gate)
        run: python -m evals.harness
        env:
          QDRANT_URL: http://localhost:6333

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Scan for secrets
        run: gitleaks detect --source . --log-opts="--all" -v
